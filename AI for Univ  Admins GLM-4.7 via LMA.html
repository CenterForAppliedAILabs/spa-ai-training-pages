           CUSTOM STYLES & OVERRIDES

        :root {
            /* Primary Color Palette - University Blue Theme */
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --primary-dark: #1e3a8a;
            
            /* Accent Colors */

            --bg-lesson: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        
        /* Base Typography */
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        
        h1, h2, h3, h4 {
            font-family: 'Merriweather', serif;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        .lesson-content {
            animation: fadeIn 0.4s ease-out;
        }
        
        /* Progress Bar Animation */
        .progress-fill {
            transition: width 0.5s ease-out;
        }
        
        /* Interactive Elements */
        .nav-item {
            transition: all 0.2s ease;
        }
        
        .nav-item:hover {
            transform: translateX(4px);
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            color: white;
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }
        
        /* Quiz Styles */
        .quiz-option {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .quiz-option:hover:not(.disabled) {
            border-color: var(--primary-light);
            background-color: #eff6ff;
        }
        
        .quiz-option.selected {
            border-color: var(--primary);
            background-color: #dbeafe;
        }
        
        .quiz-option.correct {
            border-color: var(--success);
            background-color: #d1fae5;
        }
        
        .quiz-option.incorrect {
            border-color: #ef4444;
            background-color: #fee2e2;
        }
        
        /* Accordion Styles */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .accordion-content.open {
            max-height: 2000px;
        }
        
        /* Sidebar Styles */
        .sidebar {
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 50;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        /* Icon Container */
        .icon-box {
            @apply flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 text-white shadow-lg;
        }
        
        /* Print Styles */
        @media print {
            .sidebar, .mobile-nav { display: none !important; }
            .main-content { margin-left: 0 !important; }
        }
    </style>

                    <span>Course Complete</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                `;
                nextBtn.disabled = true;
            } else {
                nextBtn.innerHTML = `
                    <span>Next Lesson</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                `;
                nextBtn.disabled = false;
            }
        }
        
        /* ==========================================
           PROGRESS TRACKING
           Handles lesson completion and progress bar
           ========================================== */
        
        function markLessonComplete(index) {
            completedLessons.add(index);
            updateProgress();
            initializeNavigation();
            saveProgress();
        }
        
        function updateProgress() {
            const total = courseData.length;
            const completed = completedLessons.size;
            const percentage = Math.round((completed / total) * 100);
            
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressPercent').textContent = percentage + '%';
            document.getElementById('completedLessons').textContent = completed;
        }
        
        /* ==========================================
           QUIZ SYSTEM
           Creates and handles interactive quizzes
           ========================================== */
        
        function createQuiz(quiz, lessonIndex) {
            return `
                <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm mt-8" id="quiz-${lessonIndex}">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-slate-800">Knowledge Check</h3>
                            <p class="text-sm text-slate-500">Test your understanding of this lesson</p>
                        </div>
                    </div>
                    
                    <p class="text-slate-700 mb-4 font-medium">${quiz.question}</p>
                    
                    <div class="space-y-3 mb-6" id="quiz-options-${lessonIndex}">
                        ${quiz.options.map((option, optIndex) => `
                            <button 
                                onclick="selectQuizOption(${lessonIndex}, ${optIndex}, ${quiz.correct})"
                                class="quiz-option w-full text-left p-4 border-2 border-gray-200 rounded-lg transition-all"
                                data-option="${optIndex}"
                            >
                                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-gray-600 text-sm font-medium mr-3">${String.fromCharCode(65 + optIndex)}</span>
                                ${option}
                            </button>
                        `).join('')}
                    </div>
                    
                    <div id="quiz-feedback-${lessonIndex}" class="hidden">
                        <div class="p-4 rounded-lg mb-4" id="feedback-content-${lessonIndex}"></div>
                        <button 
                            onclick="markLessonComplete(${lessonIndex})" 
                            class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors"
                        >
                            Mark Lesson Complete
                        </button>
                    </div>
                </div>
            `;
        }
        
        function selectQuizOption(lessonIndex, selectedOption, correctOption) {
            const quizContainer = document.getElementById(`quiz-${lessonIndex}`);
            const options = quizContainer.querySelectorAll('.quiz-option');
            const feedbackContainer = document.getElementById(`quiz-feedback-${lessonIndex}`);
            const feedbackContent = document.getElementById(`feedback-content-${lessonIndex}`);
            const lesson = courseData[lessonIndex];
            
            // Disable all options
            options.forEach(opt => {
                opt.classList.add('disabled');
                opt.onclick = null;
            });
            
            // Highlight selected option
            const selectedEl = options[selectedOption];
            const correctEl = options[correctOption];
            
            if (selectedOption === correctOption) {
                selectedEl.classList.add('correct');
                feedbackContent.className = 'p-4 rounded-lg mb-4 bg-green-50 border border-green-200';
                feedbackContent.innerHTML = `
                    <div class="flex items-center gap-2 text-green-800 font-semibold mb-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                        Correct!
                    </div>
                    <p class="text-green-700 text-sm">${lesson.quiz.explanation}</p>
                `;
                quizScores[lessonIndex] = true;
            } else {
                selectedEl.classList.add('incorrect');
                correctEl.classList.add('correct');
                feedbackContent.className = 'p-4 rounded-lg mb-4 bg-amber-50 border border-amber-200';
                feedbackContent.innerHTML = `
                    <div class="flex items-center gap-2 text-amber-800 font-semibold mb-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        Not quite right
                    </div>
                    <p class="text-amber-700 text-sm">${lesson.quiz.explanation}</p>
                `;
                quizScores[lessonIndex] = false;
            }
            
            feedbackContainer.classList.remove('hidden');
            saveProgress();
        }
        
        /* ==========================================
           UI COMPONENTS
           Accordion, sidebar, and mobile menu
           ========================================== */
        
        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.accordion-icon');
            
            content.classList.toggle('open');
            icon.classList.toggle('rotate-180');
        }
        
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.remove('hidden');
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        }
        
        // Mobile menu toggle
        document.getElementById('menuToggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });
        
        /* ==========================================
           LOCAL STORAGE
           Save and load user progress
           ========================================== */
        
        function saveProgress() {
            const progress = {
                completedLessons: Array.from(completedLessons),
                currentLesson: currentLesson,
                quizScores: quizScores
            };
            localStorage.setItem('aiCourseProgress', JSON.stringify(progress));
        }
        
        function loadProgress() {
            const saved = localStorage.getItem('aiCourseProgress');
            if (saved) {
                const progress = JSON.parse(saved);
                completedLessons = new Set(progress.completedLessons || []);
                currentLesson = progress.currentLesson || 0;
                quizScores = progress.quizScores || {};
                
                loadLesson(currentLesson);
                updateProgress();
            }
        }
    </script>
</body>
</html>
