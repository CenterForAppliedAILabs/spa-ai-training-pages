            { term: "Artificial Intelligence (AI)", def: "The simulation of human intelligence processes by machines, especially computer systems." },

            { term: "Generative AI", def: "A category of AI that can create new content, including text, images, audio, and video, rather than simply analyzing existing data." },
            { term: "Hallucination", def: "When an AI model generates false or misleading information but presents it confidently as fact." },
            { term: "Prompt", def: "The input or query text provided by a user to an AI model to elicit a specific response." },
            { term: "Prompt Engineering", def: "The art of crafting inputs (prompts) to guide Generative AI models to produce the best possible outputs." },
            { term: "Token", def: "The basic unit of text an LLM processes. Roughly equivalent to 3/4 of a word in English." },
            { term: "Context Window", def: "The limit on the amount of text (measured in tokens) an LLM can consider at one time (including your prompt and its previous answers)." },
            { term: "Zero-shot Prompting", def: "Asking the AI to do something without providing any examples of the desired output." },
            { term: "Few-shot Prompting", def: "Providing a few examples of the task within the prompt to guide the AI's performance." },
            { term: "Chain of Thought", def: "A prompting technique where you ask the model to explain its reasoning step-by-step before giving a final answer." },
            { term: "Temperature", def: "A setting that controls the randomness of the AI's output. High temperature = creative/random; Low temperature = focused/deterministic." },
            { term: "NLP (Natural Language Processing)", def: "A branch of AI that helps computers understand, interpret, and manipulate human language." },
            { term: "Training Data", def: "The massive dataset (books, websites, articles) fed into the AI during its development to teach it patterns." },
            { term: "Bias", def: "Prejudices in the output of an AI model, often reflecting the prejudices present in the training data." },
            { term: "Multimodal", def: "AI models that can process and generate multiple types of media (e.g., text, images, and audio) simultaneously." },
            { term: "Plugin / Extension", def: "Add-ons that allow LLMs to access external tools, like the internet or a calculator, to perform specific tasks." },
            { term: "PII (Personally Identifiable Information)", def: "Sensitive personal data (names, SSNs, etc.) that should NEVER be entered into public AI tools." },
            { term: "Fine-tuning", def: "The process of taking a pre-trained model and training it further on a specific dataset to specialize it." },

                    ok: "Help me reply to an angry student.",
                    good: "Write a polite reply to a student complaining about their roommate.",
                    better: "Draft a diplomatic and empathetic email response to a student who is requesting an immediate room change due to a roommate conflict. Acknowledge their frustration, explain the 2-week freeze period on moves, and offer a mediation meeting time for next Tuesday."
                }
            ],
            "Faculty Support": [
                {
                    scenario: "Syllabus Generation",
                    ok: "Make a syllabus for Intro to Psych.",
                    good: "Create a syllabus for a 12-week Intro to Psychology course.",
                    better: "Design a comprehensive syllabus structure for a 12-week 'Introduction to Psychology' undergraduate course. Include learning objectives based on Bloom's Taxonomy, a weekly breakdown of topics ranging from Neuroscience to Social Psych, and suggestion for 3 major assignments."
                },
                {
                    scenario: "Rubric Creation",
                    ok: "Make a grading rubric.",
                    good: "Create a grading rubric for a research paper.",
                    better: "Generate a table-format grading rubric for a final research paper (2000 words). Columns should be: Excellent (A), Good (B), Satisfactory (C), Needs Improvement (D/F). Rows should be: Thesis Statement, Evidence & Analysis, Organization, and Citation Formatting."
                }
            ],
            "Finance/HR": [
                {
                    scenario: "Job Description",
                    ok: "Write a job post for an accountant.",
                    good: "Write a job description for a University Junior Accountant.",
                    better: "Draft a competitive job description for a 'Junior Accountant' in the University Finance Office. Include responsibilities like grant tracking and tuition reconciliation. Required skills: Excel pivot tables and banner experience. Emphasize our tuition remission benefit in the intro."
                },
                {
                    scenario: "Policy Simplification",
                    ok: "Rewrite this travel policy.",
                    good: "Rewrite this travel reimbursement policy to be simpler.",
                    better: "Rewrite the following travel reimbursement policy text to be easily understood by new faculty. lower the reading level to 8th grade, remove jargon, and use a step-by-step numbered list format for the submission process."
                }
            ]
        };

        const quizQuestions = [
            { q: "What does LLM stand for?", options: ["Large Learning Machine", "Large Language Model", "Long Lasting Memory", "Logical Language Maker"], a: 1 },
            { q: "Which of the following is an example of a 'Hallucination'?", options: ["The AI refuses to answer", "The AI gives a correct answer slowly", "The AI confidently invents a fake historical event", "The AI asks for clarification"], a: 2 },
            { q: "What is a 'Prompt'?", options: ["The output text", "The input instructions you give the AI", "The internal code of the AI", "The speed of the response"], a: 1 },
            { q: "True or False: It is safe to put student social security numbers into free ChatGPT.", options: ["True", "False"], a: 1 },
            { q: "What is 'Zero-shot' prompting?", options: ["Asking with no examples", "Asking with 10 examples", "Asking the AI to generate images", "Restarting the chat"], a: 0 },
            { q: "Which tool is integrated into Microsoft Edge?", options: ["ChatGPT", "Claude", "Copilot", "Bard"], a: 2 },
            { q: "What is a 'Token' approximately equal to?", options: ["One sentence", "One character", "3/4 of a word", "One paragraph"], a: 2 },
            { q: "To get better results, you should usually:", options: ["Be vague and brief", "Provide context, persona, and specific constraints", "Type in all caps", "Ask only one question per day"], a: 1 },
            { q: "What is 'Chain of Thought' prompting?", options: ["Asking the AI to explain its reasoning steps", "Linking multiple chats together", "Repeating the same question", "Using multiple AIs at once"], a: 0 },
            { q: "Which is NOT a recommended use of AI for admins?", options: ["Drafting emails", "Summarizing meeting notes", "Making final hiring decisions without human review", "Brainstorming event ideas"], a: 2 },
            { q: "What does 'Generative' mean in Generative AI?", options: ["It generates electricity", "It can create new content", "It is general purpose", "It generates revenue"], a: 1 },
            { q: "If an AI output looks perfect, you should:", options: ["Send it immediately", "Review and verify it for accuracy", "Delete it", "Assume it is plagiarized"], a: 1 },
            { q: "What is a 'Context Window'?", options: ["The screen on your computer", "The amount of text the AI can consider at once", "A pop-up ad", "The time of day you use AI"], a: 1 },
            { q: "Who owns the copyright to AI-generated text in the US (currently)?", options: ["The AI company", "The user", "The University", "No one (Public Domain)"], a: 3 },
            { q: "Which prompting element defines 'Who' the AI should act as?", options: ["Constraint", "Persona", "Format", "Tone"], a: 1 },
            { q: "Why might you use a 'Temperature' setting?", options: ["To cool down the server", "To control creativity vs determinism", "To make the AI faster", "To change the color scheme"], a: 1 },
            { q: "What is 'Fine-tuning'?", options: ["Fixing a broken computer", "Training a model on specific data", "Adjusting your monitor brightness", "Writing better prompts"], a: 1 },
            { q: "Which department might use AI to check for course scheduling conflicts?", options: ["Admissions", "Registrar", "Dining Services", "Alumni Relations"], a: 1 },
            { q: "What is the best way to handle bias in AI?", options: ["Ignore it", "Be aware of it and review outputs carefully", "Stop using AI", "Only use AI for math"], a: 1 },
            { q: "Which prompt is better?", options: ["Write an email.", "Write a professional email to Faculty about the new parking policy, max 200 words."], a: 1 }
        ];

        // --- App State ---
        let currentQuizIndex = 0;
        let quizScore = 0;
        let userAnswers = [];

        // --- Navigation ---
        function navigateTo(viewId) {
            // Update Nav State
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('nav-active');
            });
            const activeNav = document.getElementById(`nav-${viewId}`);
            if(activeNav) activeNav.classList.add('nav-active');

            // Render Content
            const appContent = document.getElementById('app-content');
            const template = document.getElementById(`view-${viewId}`);
            
            if(template) {
                appContent.innerHTML = '';
                appContent.appendChild(template.content.cloneNode(true));
                
                // Initialize specific view logic
                if(viewId === 'prompts') initPrompts();
                if(viewId === 'glossary') initGlossary();
                if(viewId === 'quiz') resetQuizUI(); // Just reset UI, don't auto start
                
                window.scrollTo(0,0);
            }
        }

        // --- Prompts Logic ---
        function initPrompts() {
            const tabsContainer = document.getElementById('dept-tabs');
            const contentContainer = document.getElementById('dept-content');
            const departments = Object.keys(promptsData);
            
            // Create Tabs
            departments.forEach((dept, index) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full border border-slate-300 text-sm font-semibold transition ${index === 0 ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}`;
                btn.innerText = dept;
                btn.onclick = () => loadDeptPrompts(dept, btn);
                tabsContainer.appendChild(btn);
            });

            // Load first dept by default
            if(departments.length > 0) loadDeptPrompts(departments[0], tabsContainer.children[0]);
        }

        function loadDeptPrompts(dept, activeBtn) {
            // Update tabs styling
            const tabs = document.getElementById('dept-tabs').children;
            for(let tab of tabs) {
                tab.className = 'px-4 py-2 rounded-full border border-slate-300 text-sm font-semibold transition bg-white text-slate-600 hover:bg-slate-100';
            }
            activeBtn.className = 'px-4 py-2 rounded-full border border-slate-800 text-sm font-semibold transition bg-slate-800 text-white shadow-md';

            // Render content
            const container = document.getElementById('dept-content');
            container.innerHTML = `<h3 class="text-2xl font-bold text-[#002E5D] mb-6 border-b pb-2">${dept} Scenarios</h3>`;
            
            promptsData[dept].forEach(item => {
                container.innerHTML += `
                    <div class="mb-8 last:mb-0">
                        <h4 class="text-lg font-bold text-slate-700 mb-3"><i class="fa-solid fa-layer-group mr-2 text-slate-400"></i>${item.scenario}</h4>
                        <div class="grid md:grid-cols-3 gap-4">
                            <!-- OK -->
                            <div class="prompt-card bg-red-50 border-l-4 border-red-400 p-4 rounded-r-lg">
                                <span class="text-xs font-bold text-red-500 uppercase tracking-wide">Ok Prompt</span>
                                <p class="text-sm text-slate-700 mt-2 italic">"${item.ok}"</p>
                                <button onclick="copyToClipboard('${item.ok.replace(/'/g, "\\'")}')" class="mt-3 text-xs bg-white border border-red-200 text-red-500 px-2 py-1 rounded hover:bg-red-100">Copy</button>
                            </div>
                            <!-- GOOD -->
                            <div class="prompt-card bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-lg">
                                <span class="text-xs font-bold text-orange-500 uppercase tracking-wide">Good Prompt</span>
                                <p class="text-sm text-slate-700 mt-2 italic">"${item.good}"</p>
                                <button onclick="copyToClipboard('${item.good.replace(/'/g, "\\'")}')" class="mt-3 text-xs bg-white border border-orange-200 text-orange-500 px-2 py-1 rounded hover:bg-orange-100">Copy</button>
                            </div>
                            <!-- BETTER -->
                            <div class="prompt-card bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg shadow-sm">
                                <span class="text-xs font-bold text-green-600 uppercase tracking-wide">Better Prompt</span>
                                <p class="text-sm text-slate-700 mt-2 italic">"${item.better}"</p>
                                <button onclick="copyToClipboard('${item.better.replace(/'/g, "\\'")}')" class="mt-3 text-xs bg-white border border-green-200 text-green-600 px-2 py-1 rounded hover:bg-green-100 font-bold"><i class="fa-regular fa-copy mr-1"></i>Copy</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Prompt copied to clipboard!");
            });
        }

        // --- Glossary Logic ---
        function initGlossary() {
            renderGlossary(glossaryTerms);
            
            document.getElementById('glossary-search').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = glossaryTerms.filter(item => 
                    item.term.toLowerCase().includes(query) || 
                    item.def.toLowerCase().includes(query)
                );
                renderGlossary(filtered);
            });
        }

        function renderGlossary(items) {
            const grid = document.getElementById('glossary-grid');
            grid.innerHTML = '';
            if(items.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 col-span-3 text-center py-8">No terms found.</p>';
                return;
            }
            items.sort((a,b) => a.term.localeCompare(b.term)).forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200 hover:border-[#002E5D] transition group h-full">
                        <h3 class="font-bold text-[#002E5D] mb-2 group-hover:text-[#F05123] transition-colors">${item.term}</h3>
                        <p class="text-sm text-slate-600 leading-relaxed">${item.def}</p>
                    </div>
                `;
            });
        }

        // --- Quiz Logic ---
        function resetQuizUI() {
            // This just ensures the template is clean when loaded
            // Logic is handled in startQuiz
        }

        function startQuiz() {
            currentQuizIndex = 0;
            quizScore = 0;
            userAnswers = [];
            
            document.getElementById('quiz-start').classList.add('hidden');
            document.getElementById('quiz-question-ui').classList.remove('hidden');
            document.getElementById('quiz-results').classList.add('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            const qData = quizQuestions[currentQuizIndex];
            document.getElementById('q-current').innerText = currentQuizIndex + 1;
            document.getElementById('q-score-display').innerText = `Score: ${quizScore}`;
            
            // Progress Bar
            const pct = ((currentQuizIndex) / quizQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            document.getElementById('q-text').innerText = qData.q;
            
            const optsContainer = document.getElementById('q-options');
            optsContainer.innerHTML = '';
            
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-lg border border-slate-300 hover:bg-blue-50 transition flex items-center group";
                btn.onclick = () => handleAnswer(idx, btn);
                btn.innerHTML = `
                    <div class="w-6 h-6 rounded-full border-2 border-slate-300 mr-3 flex items-center justify-center group-hover:border-blue-500">
                        <div class="w-3 h-3 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></div>
                    </div>
                    <span>${opt}</span>
                `;
                optsContainer.appendChild(btn);
            });

            // Hide feedback/next btn
            document.getElementById('q-feedback').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
        }

        function handleAnswer(selectedIndex, btnElement) {
            // Disable all buttons
            const buttons = document.getElementById('q-options').children;
            for(let btn of buttons) {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            const qData = quizQuestions[currentQuizIndex];
            const isCorrect = selectedIndex === qData.a;
            
            // Highlight
            if(isCorrect) {
                btnElement.classList.remove('border-slate-300', 'hover:bg-blue-50');
                btnElement.classList.add('bg-green-100', 'border-green-500');
                btnElement.querySelector('.border-2').classList.add('border-green-600', 'bg-white');
                btnElement.querySelector('.w-3').classList.add('bg-green-600', 'opacity-100');
                quizScore++;
                
                showFeedback(true, "Correct!");
            } else {
                btnElement.classList.remove('border-slate-300', 'hover:bg-blue-50');
                btnElement.classList.add('bg-red-100', 'border-red-500');
                
                // Highlight correct one
                const correctBtn = buttons[qData.a];
                correctBtn.classList.remove('opacity-50');
                correctBtn.classList.add('bg-green-50', 'border-green-500');

                showFeedback(false, `Incorrect. The correct answer was: ${qData.options[qData.a]}`);
            }

            document.getElementById('btn-next').classList.remove('hidden');
            if(currentQuizIndex === quizQuestions.length - 1) {
                document.getElementById('btn-next').innerText = "Finish Quiz";
            } else {
                document.getElementById('btn-next').innerText = "Next Question";
            }
        }

        function showFeedback(isCorrect, text) {
            const fb = document.getElementById('q-feedback');
            fb.classList.remove('hidden');
            fb.className = `mt-6 p-4 rounded-lg border ${isCorrect ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`;
            fb.innerHTML = `<strong>${isCorrect ? 'Great Job!' : 'Oops!'}</strong> ${text}`;
        }

        function nextQuestion() {
            currentQuizIndex++;
            if(currentQuizIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-question-ui').classList.add('hidden');
            const results = document.getElementById('quiz-results');
            results.classList.remove('hidden');

            const percentage = Math.round((quizScore / quizQuestions.length) * 100);
            document.getElementById('final-score').innerText = percentage;

            const icon = document.getElementById('score-icon');
            const msg = document.getElementById('result-message');

            if(percentage >= 80) {
                icon.innerHTML = '<i class="fa-solid fa-trophy text-yellow-400"></i>';
                msg.innerHTML = "<strong>Congratulations!</strong> You have demonstrated a strong understanding of AI concepts for administration. You are ready to start applying these tools in your daily workflows.";
                msg.className = "p-4 bg-green-50 rounded-lg mb-8 text-sm text-green-800 border border-green-200";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-book-open-reader text-slate-400"></i>';
                msg.innerHTML = "<strong>Keep Learning.</strong> You're on the right track, but might want to review the Glossary and Prompting Guide again before retaking the assessment.";
                msg.className = "p-4 bg-slate-100 rounded-lg mb-8 text-sm text-slate-700 border border-slate-200";
            }
        }

        function resetQuiz() {
            startQuiz();
        }

        // --- Init ---
        // Load Home on Start
        document.addEventListener('DOMContentLoaded', () => {
            navigateTo('home');
        });

    </script>
</body>
</html>
